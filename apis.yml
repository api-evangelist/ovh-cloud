apis:
  - aid: ovh-cloud:ovh-cloud-api
    name: OVH Cloud API
    description: The OVHcloud API enables programmatic management of OVHcloud resources including dedicated servers, public
      cloud instances, storage, networking, Kubernetes, load balancers, container registries, databases, IP addressing, snapshots,
      SSH keys, billing operations, quotas, regions, and the vRack private network. It is the unified surface for automating
      the OVHcloud platform across compute, storage, network, and account lifecycle operations.
    humanURL: https://api.us.ovhcloud.com/console/?branch=v1
